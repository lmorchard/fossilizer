<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🧐</text></svg>">
    
    {% block head %}
      <title>{% block title %}{% endblock title %}</title>
    {% endblock head %}

    <link rel="top" href="{{ site_root ~ "/index.html" }}" title="Index" />

    <link href="{{ site_root | safe }}/pagefind/pagefind-ui.css" rel="stylesheet">
    <script src="{{ site_root | safe }}/pagefind/pagefind-ui.js" type="text/javascript"></script>    

    <link href="{{ site_root | safe }}/index.css" rel="stylesheet">
    <script src="{{ site_root | safe }}/index.js" type="module"></script>
  </head>
  <body class="fossilizer">
    <archive-nav>
      <archive-nav-date-selector></archive-nav-date-selector>
      <archive-nav-search></archive-nav-search>
      <theme-selector>
        <button>
          <span class="icon light">🌞</span>
          <span class="icon dark">🌚</span>
        </button>
      </theme-selector>
    </archive-nav>
    <archive-main>
      {% block content %} {% endblock content %}
    </archive-main>
  </body>
</html>
